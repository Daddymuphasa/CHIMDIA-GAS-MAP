version: '3.8'

services:
  # 1. Database Storage Engine (Postgres + PostGIS)
  postgres:
    image: postgis/postgis:15-3.3
    container_name: gasgrid-postgres
    environment:
      POSTGRES_DB: gasgrid
      POSTGRES_USER: gasgrid_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-gasgrid_secure_pass}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - gasgrid-net
    ports:
      - "5432:5432"
    restart: unless-stopped

  # 2. Keycloak IAM Service (User Access & RBAC)
  keycloak:
    image: keycloak/keycloak:21.1
    container_name: gasgrid-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-keycloak_secure_admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/gasgrid
      KC_DB_USERNAME: gasgrid_admin
      KC_DB_PASSWORD: ${DB_PASSWORD:-gasgrid_secure_pass}
    volumes:
      - ./docker/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    depends_on:
      - postgres
    networks:
      - gasgrid-net
    ports:
      - "8080:8080"
    restart: unless-stopped

  # 3. GeoServer GIS Map Server (WMS/WFS Services)
  geoserver:
    image: oscarfonts/geoserver:2.22.0
    container_name: gasgrid-geoserver
    environment:
      GEOSERVER_ADMIN_PASSWORD: ${GEOSERVER_ADMIN_PASSWORD:-geoserver_secure_admin}
      STABLE_EXTENSIONS: yslld-plugin,h2-plugin,mysql-plugin,postgres-plugin
    volumes:
      - geodata:/var/local/geoserver
    depends_on:
      - postgres
    networks:
      - gasgrid-net
    ports:
      - "8082:8080"
    restart: unless-stopped

  # 4. EMQX MQTT Telemetry Broker (IoT Ingestion Gateway)
  emqx:
    image: emqx:5.1.0
    container_name: gasgrid-emqx
    environment:
      EMQX_DASHBOARD__SECURITY__ADMIN_PASSWORD: ${EMQX_ADMIN_PASSWORD:-emqx_secure_admin}
    ports:
      - "1883:1883"      # MQTT Protocol Port
      - "18083:18083"    # Web Dashboard Port
    networks:
      - gasgrid-net
    restart: unless-stopped

  # 5. MinIO Local Object Storage (PDFs & Media files)
  minio:
    image: minio/minio:RELEASE.2023-05-18T00-12-46Z
    container_name: gasgrid-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minio_secure_pass}
    volumes:
      - miniodata:/data
    networks:
      - gasgrid-net
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped

volumes:
  pgdata:
  geodata:
  miniodata:

networks:
  gasgrid-net:
    driver: bridge
